<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Calculadora</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .calculadora-container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 350px;
            position: relative;
            overflow: hidden;
        }

        /* Medias lunas decorativas */
        .media-luna-top {
            position: absolute;
            top: -30px;
            right: -30px;
            width: 80px;
            height: 80px;
            background-color: #667eea;
            border-radius: 0 0 0 80px;
            opacity: 0.3;
        }

        .media-luna-bottom {
            position: absolute;
            bottom: -30px;
            left: -30px;
            width: 80px;
            height: 80px;
            background-color: #764ba2;
            border-radius: 80px 0 0 0;
            opacity: 0.3;
        }

        .content {
            position: relative;
            z-index: 1;
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .grupo-input {
            margin-bottom: 20px;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #666;
            font-size: 14px;
            font-weight: 600;
        }

        input[type="number"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 50px;
            box-sizing: border-box;
            font-size: 16px;
            transition: all 0.3s;
            background-color: #f9f9f9;
        }

        input[type="number"]:focus {
            border-color: #667eea;
            background-color: #fff;
            outline: none;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        /* Media luna en input */
        .grupo-input::before {
            content: '';
            position: absolute;
            left: -8px;
            top: 38px;
            width: 20px;
            height: 20px;
            background-color: #667eea;
            border-radius: 0 20px 20px 0;
            opacity: 0.2;
        }

        .botones-operacion {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 25px;
        }

        button {
            padding: 14px;
            font-size: 15px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        button:hover::before {
            opacity: 1;
        }

        button:active {
            transform: scale(0.96);
        }

        .btn-op {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-op:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .btn-limpiar {
            grid-column: span 2;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(245, 87, 108, 0.4);
        }

        .btn-limpiar:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(245, 87, 108, 0.6);
        }

        .resultado-box {
            margin-top: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #e8f5e9 0%, #e3f2fd 100%);
            border-left: 5px solid #667eea;
            border-radius: 15px;
            text-align: center;
            position: relative;
        }

        /* Media luna en resultado */
        .resultado-box::after {
            content: '';
            position: absolute;
            right: -15px;
            top: -15px;
            width: 40px;
            height: 40px;
            background-color: #667eea;
            border-radius: 0 0 0 40px;
            opacity: 0.15;
        }

        .resultado-box h3 {
            margin: 0 0 10px 0;
            color: #667eea;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #resultado {
            font-size: 32px;
            font-weight: bold;
            color: #333;
            word-break: break-all;
            position: relative;
            z-index: 1;
        }
    </style>
</head>
<body>

<div class="calculadora-container">
    <div class="media-luna-top"></div>
    <div class="media-luna-bottom"></div>
    
    <div class="content">
        <h2>🧮 Calculadora</h2>
        
        <div class="grupo-input">
            <label for="num1">Primer Número:</label>
            <input type="number" id="num1" placeholder="Ej. 10">
        </div>
        
        <div class="grupo-input">
            <label for="num2">Segundo Número:</label>
            <input type="number" id="num2" placeholder="Ej. 5">
        </div>

        <div class="botones-operacion">
            <button class="btn-op" onclick="calcular('sumar')">Sumar (+)</button>
            <button class="btn-op" onclick="calcular('restar')">Restar (-)</button>
            <button class="btn-op" onclick="calcular('multiplicar')">Multiplicar (×)</button>
            <button class="btn-op" onclick="calcular('dividir')">Dividir (÷)</button>
            <button class="btn-limpiar" onclick="limpiar()">Limpiar pantalla</button>
        </div>

        <div class="resultado-box">
            <h3>Resultado:</h3>
            <div id="resultado">-</div>
        </div>
    </div>
</div>

<script>
    function calcular(operacion) {
        const num1 = parseFloat(document.getElementById('num1').value);
        const num2 = parseFloat(document.getElementById('num2').value);
        const resultadoDiv = document.getElementById('resultado');

        // Validar que ambos números sean válidos
        if (isNaN(num1) || isNaN(num2)) {
            resultadoDiv.textContent = 'Por favor ingresa ambos números';
            return;
        }

        let resultado;

        switch(operacion) {
            case 'sumar':
                resultado = num1 + num2;
                break;
            case 'restar':
                resultado = num1 - num2;
                break;
            case 'multiplicar':
                resultado = num1 * num2;
                break;
            case 'dividir':
                if (num2 === 0) {
                    resultadoDiv.textContent = 'Error: No se puede dividir entre 0';
                    return;
                }
                resultado = num1 / num2;
                break;
            default:
                resultadoDiv.textContent = 'Operación no válida';
                return;
        }

        resultadoDiv.textContent = resultado;
    }

    function limpiar() {
        document.getElementById('num1').value = '';
        document.getElementById('num2').value = '';
        document.getElementById('resultado').textContent = '-';
    }
</script>

</body>
</html>
