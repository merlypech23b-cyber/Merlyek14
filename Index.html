<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Mágica Lunar</title>
    <style>
        /* Estilos Base y Fondo Estelar */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e1b4b);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            overflow: hidden;
            position: relative;
        }

        /* Creación de las Medias Lunas en el fondo */
        .luna {
            position: absolute;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            /* El truco de la media luna: una sombra interna o externa tapando el círculo */
            box-shadow: -25px 25px 0 0 #fde047;
            opacity: 0.2;
            z-index: 0;
            animation: flotar 8s ease-in-out infinite alternate;
        }

        .luna-1 {
            top: 15%;
            left: 15%;
            transform: rotate(-20deg);
        }

        .luna-2 {
            bottom: 20%;
            right: 15%;
            transform: rotate(45deg) scale(1.5);
            animation-delay: 2s;
        }

        @keyframes flotar {
            0% { transform: translateY(0px) rotate(-20deg); }
            100% { transform: translateY(-20px) rotate(-10deg); }
        }

        /* Contenedor de la Calculadora */
        .calculadora-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            width: 320px;
            z-index: 10;
            color: #fff;
            text-align: center;
        }

        h2 {
            margin-top: 0;
            margin-bottom: 20px;
            font-weight: 400;
            letter-spacing: 2px;
            color: #e2e8f0;
        }

        /* Estilos de los Inputs */
        .input-group {
            margin-bottom: 15px;
        }

        input[type="number"] {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            transition: background 0.3s;
        }

        input[type="number"]::placeholder {
            color: #cbd5e1;
        }

        input[type="number"]:focus {
            background: rgba(255, 255, 255, 0.3);
        }

        /* Botones de Operación */
        .botones-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 20px;
        }

        button {
            padding: 12px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
        }

        .btn-op {
            background-color: #38bdf8;
            color: #0f172a;
        }

        .btn-op:hover {
            background-color: #7dd3fc;
            transform: translateY(-2px);
        }

        .btn-clear {
            grid-column: span 2;
            background-color: #ef4444;
            color: white;
            margin-top: 5px;
        }

        .btn-clear:hover {
            background-color: #f87171;
            transform: translateY(-2px);
        }

        /* Pantalla de Resultado */
        .resultado-box {
            margin-top: 25px;
            padding: 15px;
            background: rgba(15, 23, 42, 0.6);
            border-radius: 8px;
            min-height: 24px;
        }

        #resultado {
            font-size: 22px;
            font-weight: 600;
            color: #34d399;
            margin: 0;
            word-wrap: break-word;
        }
    </style>
</head>
<body>

    <div class="luna luna-1"></div>
    <div class="luna luna-2"></div>

    <div class="calculadora-container">
        <h2>CALCULADORA</h2>
        
        <div class="input-group">
            <input type="number" id="num1" placeholder="Primer número">
        </div>
        
        <div class="input-group">
            <input type="number" id="num2" placeholder="Segundo número">
        </div>

        <div class="botones-grid">
            <button class="btn-op" onclick="calcular('+')">+</button>
            <button class="btn-op" onclick="calcular('-')">-</button>
            <button class="btn-op" onclick="calcular('*')">×</button>
            <button class="btn-op" onclick="calcular('/')">÷</button>
            <button class="btn-clear" onclick="limpiar()">Borrar Todo</button>
        </div>

        <div class="resultado-box">
            <p id="resultado">Resultado: -</p>
        </div>
    </div>

    <script>
        function calcular(operacion) {
            // Obtenemos los valores de los inputs y los convertimos a números flotantes
            const n1 = parseFloat(document.getElementById('num1').value);
            const n2 = parseFloat(document.getElementById('num2').value);
            const txtResultado = document.getElementById('resultado');

            // Validamos que se hayan ingresado ambos números
            if (isNaN(n1) || !document.getElementById('num1').value || isNaN(n2) || !document.getElementById('num2').value) {
                txtResultado.style.color = "#f87171"; // Color rojo de error
                txtResultado.innerText = "Ingresa ambos números";
                return;
            }

            let res = 0;

            // Evaluamos la operación elegida
            switch (operacion) {
                case '+':
                    res = n1 + n2;
                    break;
                case '-':
                    res = n1 - n2;
                    break;
                case '*':
                    res = n1 * n2;
                    break;
                case '/':
                    if (n2 === 0) {
                        txtResultado.style.color = "#f87171";
                        txtResultado.innerText = "No se puede dividir por 0";
                        return;
                    }
                    res = n1 / n2;
                    break;
            }

            // Mostramos el resultado en pantalla limpiando el formato de error si lo hubiera
            txtResultado.style.color = "#34d399"; // Color verde éxito
            txtResultado.innerText = `Resultado: ${res}`;
        }

        // Función para resetear los valores
        function limpiar() {
            document.getElementById('num1').value = '';
            document.getElementById('num2').value = '';
            const txtResultado = document.getElementById('resultado');
            txtResultado.style.color = "#e2e8f0";
            txtResultado.innerText = "Resultado: -";
        }
    </script>
</body>
</html>
