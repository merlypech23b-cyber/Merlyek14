<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Calculadora</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .calculator-container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            width: 350px;
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-size: 14px;
        }

        input[type="number"] {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="number"]:focus {
            border-color: #4a90e2;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 20px;
        }

        button {
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        button:active {
            transform: scale(0.98);
        }

        .btn-op {
            background-color: #4a90e2;
            color: white;
        }

        .btn-op:hover {
            background-color: #357abd;
        }

        .btn-clear {
            grid-column: span 2;
            background-color: #e74c3c;
            color: white;
            margin-top: 5px;
        }

        .btn-clear:hover {
            background-color: #c0392b;
        }

        .result-box {
            margin-top: 25px;
            padding: 15px;
            background-color: #f8f9fa;
            border-left: 5px solid #4a90e2;
            border-radius: 4px;
            text-align: center;
        }

        .result-box p {
            font-size: 14px;
            color: #777;
        }

        .result-box span {
            display: block;
            font-size: 22px;
            font-weight: bold;
            color: #333;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div class="calculator-container">
    <h2>Calculadora</h2>
    
    <div class="input-group">
        <label for="num1">Número 1</label>
        <input type="number" id="num1" placeholder="Ej. 12">
    </div>
    
    <div class="input-group">
        <label for="num2">Número 2</label>
        <input type="number" id="num2" placeholder="Ej. 5">
    </div>

    <div class="btn-grid">
        <button class="btn-op" onclick="calcular('sumar')">Suma (+)</button>
        <button class="btn-op" onclick="calcular('restar')">Resta (-)</button>
        <button class="btn-op" onclick="calcular('multiplicar')">Multiplicar (×)</button>
        <button class="btn-op" onclick="calcular('dividir')">Dividir (÷)</button>
        <button class="btn-clear" onclick="limpiar()">Limpiar Pantalla</button>
    </div>

    <div class="result-box">
        <p>Resultado:</p>
        <span id="resultado">0</span>
    </div>
</div>

<script>
    function calcular(operacion) {
        // Obtener los valores de los inputs y convertirlos a números flotantes
        const n1 = parseFloat(document.getElementById('num1').value);
        const n2 = parseFloat(document.getElementById('num2').value);
        const contenedorResultado = document.getElementById('resultado');

        // Validar que se hayan ingresado ambos números
        if (isNaN(n1) || !document.getElementById('num2').value) {
            contenedorResultado.innerText = "Error: Ingresa ambos números";
            contenedorResultado.style.color = "#e74c3c";
            return;
        }

        let res = 0;

        // Estructura de control para decidir la operación
        switch (operacion) {
            case 'sumar':
                res = n1 + n2;
                break;
            case 'restar':
                res = n1 - n2;
                break;
            case 'multiplicar':
                res = n1 * n2;
                break;
            case 'dividir':
                if (n2 === 0) {
                    contenedorResultado.innerText = "No se puede dividir por 0";
                    contenedorResultado.style.color = "#e74c3c";
                    return;
                }
                res = n1 / n2;
                break;
        }

        // Mostrar el resultado en pantalla y asegurar el color de texto normal
        contenedorResultado.innerText = res;
        contenedorResultado.style.color = "#333";
    }

    function limpiar() {
        // Resetear los inputs
        document.getElementById('num1').value = '';
        document.getElementById('num2').value = '';
        
        // Resetear el contenedor del resultado
        const contenedorResultado = document.getElementById('resultado');
        contenedorResultado.innerText = '0';
        contenedorResultado.style.color = "#333";
    }
</script>

</body>
</html>
